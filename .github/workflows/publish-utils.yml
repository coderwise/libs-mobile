name: Publish utils to Maven Central

on:
  push:
    tags:
      - 'utils-v*'
  workflow_dispatch:

jobs:
  publish:
    # macOS host: the library has iOS (Kotlin/Native) targets, which only
    # compile on macOS. Publishing happens rarely (tag / manual), so the
    # higher-cost runner is bounded.
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Uploads all target variants to the Central Portal and triggers release.
      # -Psign enables GPG signing (required by Central). Secret names match the
      # other coderwise repos, so the same Central token + GPG key work here.
      - name: Publish to Maven Central
        run: ./gradlew -Psign=true :utils:publishAndReleaseToMavenCentral --no-configuration-cache --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}
