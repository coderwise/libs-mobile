name: Publish to Maven Central

# Per-module, tag-driven publishing. Tag a module release as <module>-v<version>,
# e.g. `utils-v0.3.0` or `permissions-v1.2.0`. The tag is the single source of
# truth for the version. Only the tagged module is published.
on:
  push:
    tags:
      - '*-v*'
  workflow_dispatch:
    inputs:
      module:
        description: 'Gradle module to publish (e.g. utils)'
        required: true
      version:
        description: 'Version to publish (e.g. 0.3.0)'
        required: true

jobs:
  publish:
    # macOS host: the libraries have iOS (Kotlin/Native) targets, which only
    # compile on macOS. Publishing happens rarely (tag / manual).
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve module + version from tag or inputs
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODULE="${{ github.event.inputs.module }}"
            VERSION="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"   # e.g. utils-v0.3.0
            MODULE="${TAG%-v*}"        # -> utils
            VERSION="${TAG#*-v}"       # -> 0.3.0
          fi
          if [ -z "$MODULE" ] || [ -z "$VERSION" ]; then
            echo "::error::Could not parse module/version (tag must be <module>-v<version>)"; exit 1
          fi
          echo "module=$MODULE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing :$MODULE @ $VERSION"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # -Psign enables GPG signing (required by Central). -PlibVersion carries the
      # version from the tag. Secret names match the other coderwise repos.
      - name: Publish to Maven Central
        run: >-
          ./gradlew -Psign=true -PlibVersion=${{ steps.target.outputs.version }}
          :${{ steps.target.outputs.module }}:publishAndReleaseToMavenCentral
          --no-configuration-cache --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}
